STATION: include('location')
EMERGENCY_CONTACT: include('contact_info')
AZLIMITS: include('limit')
ELLIMITS: include('limit')
STOW_LOCATION: include('az_el_point')
CAL_LOCATION: include('az_el_point')
HORIZON_POINTS: list(include('az_el_point'), min=0)
MOTOR_TYPE: enum('ALFASPID', 'H180MOUNT', 'PUSHROD', 'NONE', 'CALTECH6M')
MOTOR_BAUDRATE: int()
MOTOR_PORT: str()
NUM_BEAMSWITCHES: int()
BEAMWIDTH: num()
OBSERVATION_DWELL_TIME: int(required=False)
SCAN_SETTLE_TIME: num(required=False)
ROTOR_MOVE_TIMEOUT: num(required=False)
TRACKING_COMMAND_DEADBAND_MDEG: num(required=False)
POINTING_ERROR_THRESHOLD_MDEG: num(required=False)
POINTING_ERROR_STABLE_CYCLES: int(required=False)
SAVE_DIRECTORY: str()
RUN_HEADLESS: bool()
DASHBOARD_PORT: int()
DASHBOARD_HOST: ip()
DASHBOARD_DOWNLOADS: bool()
DASHBOARD_REFRESH_MS: int()
DASHBOARD_REQUIRE_AUTH: bool(required=False)
DASHBOARD_USERNAME: str(required=False)
DASHBOARD_PASSWORD: str(required=False)
WEBCAM_ENABLE: bool(required=False)
WEBCAM_DEVICE_INDEX: int(required=False)
WEBCAM_TARGET_FPS: num(required=False)
WEBCAM_JPEG_QUALITY: int(required=False)
WEBCAM_MAX_WIDTH: int(required=False)
SPECTRUM_ANALYZER: include('spectrum_config', required=False)
SPECTRUM_ANALYZER_SERIAL: str(required=False)
SPECTRUM_ANALYZER_START_HZ: num(required=False)
SPECTRUM_ANALYZER_STOP_HZ: num(required=False)
SPECTRUM_ANALYZER_RBW_HZ: num(required=False)
SPECTRUM_ANALYZER_VBW_HZ: num(required=False)
SPECTRUM_ANALYZER_REF_LEVEL_DBM: num(required=False)
END_OBSERVATION_ON_OOB: bool(required=False)
STOW_ON_OOB: bool(required=False)
MOTOR_LPR_PARAMS: include('MOTOR_LPR_PARAMS', required=True)
---
location:
    latitude: num()
    longitude: num()
    name: str()
---
limit:
    lower_bound: num()
    upper_bound: num()
---
az_el_point:
    azimuth: num()
    elevation: num()
---
contact_info:
    name: str()
    email: str()
    phone_number: str()
---
MOTOR_LPR_PARAMS:
    pAzKo:    num()
    pElKo:    num()
    pAzKv:    num()
    pElKv:    num()
    pAze:     num()
    pEle:     num()
    pAzAmax:  num()
    pElAmax:  num()
    pAzVmax:  num()
    pElVmax:  num()
    pAzImax:  num()
    pElImax:  num()
    pAzKpp:   num()
    pElKpp:   num()
    pAzKpi:   num()
    pElKpi:   num()
    pAzKvp:   num()
    pElKvp:   num()
    pAzKvi:   num()
    pElKvi:   num()
    pAzKff:   num()
    pElKff:   num()
    pAzTmax:  num()
    pElTmax:  num()
    pAzTmin:  num()
    pElTmin:  num()
    pAzTsgn:  num()
    pElTsgn:  num()
    pAzTbias: num()
    pAzEcr:   num()
    pElEcr:   num()
    pAzMEcr:  num()
    pElMEcr:  num()
    pAzEpo:   num()
    pElEpo:   num()
    pAzAr:    num()
    pElAr:    num()
---
spectrum_config:
    instrument_serial: str(required=False)
    freq_mode: enum('start_stop', 'center_span', required=False)
    start_hz: num(required=False)
    stop_hz: num(required=False)
    center_hz: num(required=False)
    span_hz: num(required=False)
    rbw_hz: num(required=False)
    vbw_hz: num(required=False)
    ref_level_dbm: num(required=False)
    y_axis_mode: enum('auto', 'fixed_limits', 'db_per_div', required=False)
    y_db_per_div: num(required=False)
    y_num_divs: int(required=False)
    y_lim_dbm: list(num(), min=2, max=2, required=False)
    atten_auto: bool(required=False)
    atten_db: num(required=False)
    preamp_on: bool(required=False)
    trace_type: enum('clear_write', 'average', required=False)
    num_averages: int(required=False)
    x_units: enum('Hz', 'kHz', 'MHz', 'GHz', required=False)